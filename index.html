<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>LUMIAI PRO | Enterprise Scanner</title>
    <style>
        :root {
            --ios-yellow: #FFD60A;
            --ios-bg: #000000;
            --ios-card: #1C1C1E;
            --ios-blue: #0A84FF;
            --ios-green: #30D158;
            --ios-text: #FFFFFF;
            --ios-secondary: #8E8E93;
            --radius: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--ios-bg); color: var(--ios-text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; height: 100vh;
        }

        /* Top Navigation Apple Style */
        .nav-header {
            padding: 50px 20px 10px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
        }
        .nav-title { font-weight: 600; font-size: 17px; letter-spacing: -0.4px; }
        
        /* Modern Rectangular Buttons (No Ovals) */
        .btn {
            height: 50px; border-radius: var(--radius); border: none;
            font-size: 16px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.2s ease; width: 100%;
        }
        .btn-primary { background: var(--ios-yellow); color: #000; }
        .btn-secondary { background: var(--ios-card); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--ios-secondary); color: #fff; }
        .btn:active { transform: scale(0.97); opacity: 0.8; }

        /* Review Gallery */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 20px;
            overflow-y: auto; max-height: 400px;
        }
        .gallery-item {
            aspect-ratio: 3/4; background: var(--ios-card); border-radius: 8px;
            position: relative; border: 1px solid rgba(255,255,255,0.1);
        }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .page-badge {
            position: absolute; bottom: 5px; right: 5px; 
            background: rgba(0,0,0,0.6); font-size: 10px; padding: 2px 6px; border-radius: 4px;
        }

        /* Apple Camera Interface */
        .camera-ui {
            position: fixed; inset: 0; background: #000; z-index: 1000; display: none;
        }
        .camera-ui.active { display: flex; flex-direction: column; }
        .cam-frame {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 60%; border: 2px solid var(--ios-yellow);
            border-radius: 10px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        .shutter-container {
            height: 150px; background: #000; display: flex; 
            align-items: center; justify-content: space-around; padding-bottom: 30px;
        }
        .shutter-btn {
            width: 72px; height: 72px; border-radius: 50%; border: 4px solid #fff;
            padding: 4px; background: transparent; cursor: pointer;
        }
        .shutter-inner {
            width: 100%; height: 100%; background: #fff; border-radius: 50%;
        }

        /* Step screens */
        .screen { display: none; padding: 20px; height: calc(100vh - 100px); overflow-y: auto; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; color: var(--ios-secondary); margin-bottom: 8px; text-transform: uppercase; }
        input, select {
            width: 100%; background: var(--ios-card); border: 1px solid #333;
            color: #fff; padding: 14px; border-radius: var(--radius); font-size: 16px; outline: none;
        }
        
        .result-card { background: var(--ios-card); border-radius: var(--radius); padding: 20px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="nav-header">
        <div class="nav-title" id="headerTitle">Identify Yourself</div>
        <div id="stepCounter" style="color: var(--ios-secondary); font-size: 14px;">Step 1/5</div>
    </div>

    <div class="screen active" id="s1">
        <div class="form-group">
            <label>Organization Role</label>
            <select id="role" onchange="toggleRoleFields()">
                <option value="tcs">TCS Personnel</option>
                <option value="agency">Agency Representative</option>
                <option value="school">School Authority</option>
            </select>
        </div>
        <div id="dynamicFields"></div>
        <button class="btn btn-primary" onclick="nextStep(2)">Continue</button>
    </div>

    <div class="screen" id="s2">
        <div class="form-group"><label>UDISE Code</label><input type="number" id="udise" placeholder="Enter 11-digit code"></div>
        <div class="form-group"><label>School Name</label><input type="text" id="schoolName"></div>
        <div class="form-group"><label>Location</label><input type="text" id="location"></div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-secondary" onclick="prevStep(1)">Back</button>
            <button class="btn btn-primary" onclick="nextStep(3)">Next</button>
        </div>
    </div>

    <div class="screen" id="s3">
        <div class="form-group">
            <label>Select Category</label>
            <select id="scanCategory">
                <option value="Junior Winner">Junior Winner ★</option>
                <option value="Senior Winner">Senior Winner ★</option>
                <option value="ECF">ECF</option>
                <option value="WSF">WSF</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="startScanning()">Launch Camera</button>
        <button class="btn btn-outline" style="margin-top:10px" onclick="prevStep(2)">Back</button>
    </div>

    <div class="screen" id="s4">
        <h3 style="margin: 0 0 10px 20px;">Scanned Sheets</h3>
        <div class="gallery-grid" id="gallery"></div>
        <div style="padding: 20px; display: flex; flex-direction: column; gap: 10px;">
            <button class="btn btn-outline" onclick="startScanning()">+ Add More Sheets</button>
            <button class="btn btn-primary" onclick="submitAndGrade()">Submit Final Essay</button>
            <button class="btn btn-secondary" onclick="prevStep(3)">Back</button>
        </div>
    </div>

    <div class="screen" id="s5">
        <div class="result-card">
            <div style="text-align:center">
                <div style="color: var(--ios-green); font-size: 40px;">✔</div>
                <h2 style="margin:10px 0">Grading Complete</h2>
                <div style="font-size: 48px; font-weight: 800;" id="finalScore">42<span style="font-size:20px; color:var(--ios-secondary)">/50</span></div>
            </div>
            <div id="gradingDetails" style="margin-top:20px; font-size: 14px; line-height: 1.6;"></div>
        </div>
        <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px">
            <button class="btn btn-primary" onclick="shareResults()">Share Report</button>
            <button class="btn btn-secondary" onclick="location.reload()">Done (Lock Document)</button>
        </div>
    </div>

    <div class="camera-ui" id="cameraInterface">
        <div style="flex:1; position:relative">
            <video id="video" style="width:100%; height:100%; object-fit:cover" autoplay playsinline></video>
            <div class="cam-frame"></div>
            <div style="position:absolute; top:40px; width:100%; text-align:center; color:var(--ios-yellow); font-weight:600">Position Essay in Frame</div>
        </div>
        <div class="shutter-container">
            <div style="width:50px"></div>
            <div class="shutter-btn" onclick="captureSnapshot()">
                <div class="shutter-inner"></div>
            </div>
            <div id="captureCount" style="width:50px; text-align:center; font-weight:bold">0</div>
        </div>
        <button class="btn btn-outline" style="width:80%; align-self:center; margin-bottom:20px" onclick="closeCamera()">Finish Scanning</button>
    </div>

    <audio id="shutterSound" src="https://assets.mixkit.co/active_storage/sfx/700/700-preview.mp3"></audio>

<script>
    let scans = [];
    let currentStep = 1;

    function toggleRoleFields() {
        const role = document.getElementById('role').value;
        const container = document.getElementById('dynamicFields');
        const config = {
            tcs: ['Employee ID', 'Name', 'Office Location'],
            agency: ['Agency Name', 'Agent Name', 'Mobile Number'],
            school: ['School Name', 'Principal Name', 'Designation']
        };
        container.innerHTML = config[role].map(f => `<div class="form-group"><label>${f}</label><input type="text"></div>`).join('');
    }

    function nextStep(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('s' + n).classList.add('active');
        currentStep = n;
        updateUI();
    }

    function prevStep(n) { nextStep(n); }

    function updateUI() {
        const titles = ["Identify Yourself", "School Details", "Category Selection", "Review Scans", "Evaluation Results"];
        document.getElementById('headerTitle').innerText = titles[currentStep-1];
        document.getElementById('stepCounter').innerText = `Step ${currentStep}/5`;
    }

    async function startScanning() {
        document.getElementById('cameraInterface').classList.add('active');
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        document.getElementById('video').srcObject = stream;
    }

    function captureSnapshot() {
        // Play iPhone-style Shutter Sound
        document.getElementById('shutterSound').play();
        
        // Mock capture (In production, draw video to canvas)
        const mockImg = "https://images.unsplash.com/photo-1586075010633-de4d2107ad0f?auto=format&fit=crop&q=80&w=200";
        scans.push(mockImg);
        document.getElementById('captureCount').innerText = scans.length;
        
        // Visual haptic feedback
        document.body.style.opacity = "0.5";
        setTimeout(() => document.body.style.opacity = "1", 100);
    }

    function closeCamera() {
        document.getElementById('cameraInterface').classList.remove('active');
        renderGallery();
        nextStep(4);
    }

    function renderGallery() {
        const container = document.getElementById('gallery');
        container.innerHTML = scans.map((src, i) => `
            <div class="gallery-item">
                <img src="${src}">
                <div class="page-badge">Page ${i+1}</div>
            </div>
        `).join('');
    }

    function submitAndGrade() {
        if(scans.length === 0) return alert("Please scan at least one page.");
        
        // Final Submission Lock logic
        document.getElementById('s4').innerHTML = `
            <div style="text-align:center; padding:50px">
                <div class="shutter-inner" style="width:50px; height:50px; margin:0 auto; animation: spin 1s infinite linear;"></div>
                <p>AI analyzing ${scans.length} pages...</p>
            </div>
        `;
        
        setTimeout(() => {
            nextStep(5);
            document.getElementById('gradingDetails').innerHTML = `
                <b>Topic Match:</b> High (95%)<br>
                <b>Structure:</b> Strong Introduction, Logical flow.<br>
                <b>Creativity:</b> Excellent use of rural metaphors.<br>
                <b>OCR Confidence:</b> 91% (Good Scan)
            `;
        }, 2000);
    }

    function shareResults() {
        alert("Generating 3MB PDF Report... Redirecting to Share Menu.");
    }

    toggleRoleFields();
</script>

</body>
</html>
